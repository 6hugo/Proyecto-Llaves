<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="max-w-md w-full space-y-8 bg-white dark:bg-[#1a212e] p-8 rounded-xl border border-[#dbdfe6] dark:border-[#333] shadow-sm">
    <!-- Cabecera -->
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-primary text-3xl">account_circle</span>
      </div>
      <h2 class="mt-2 text-3xl font-black tracking-tight text-[#111318] dark:text-white">
        Bienvenido de nuevo
      </h2>
      <p class="mt-2 text-sm text-[#616f89] dark:text-gray-400">
        Ingresa a tu cuenta
      </p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      @if (error()) {
      <div class="rounded-lg bg-red-50 dark:bg-red-900/10 p-4 border border-red-200 dark:border-red-900/20">
        <div class="flex">
          <div class="flex-shrink-0">
            <span class="material-symbols-outlined text-red-700 dark:text-red-400 text-xl">error</span>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-medium text-red-800 dark:text-red-300">Error al iniciar sesión</h3>
            <div class="mt-2 text-sm text-red-700 dark:text-red-400">
              {{ error() }}
            </div>
          </div>
        </div>
      </div>
      }

      <div class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-[#111318] dark:text-white mb-1">
            Correo electrónico
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-400 text-lg">mail</span>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required [value]="email()"
              (input)="updateEmail($any($event.target).value)"
              class="block w-full pl-10 pr-3 py-2.5 border border-[#dbdfe6] dark:border-[#333] rounded-lg leading-5 bg-white dark:bg-[#111318] text-[#111318] dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-all shadow-sm"
              placeholder="nombre@ejemplo.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-[#111318] dark:text-white mb-1">
            Contraseña
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-400 text-lg">lock</span>
            </div>
            <input id="password" name="password" type="password" autocomplete="current-password" required
              [value]="password()" (input)="updatePassword($any($event.target).value)"
              class="block w-full pl-10 pr-3 py-2.5 border border-[#dbdfe6] dark:border-[#333] rounded-lg leading-5 bg-white dark:bg-[#111318] text-[#111318] dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary sm:text-sm transition-all shadow-sm"
              placeholder="••••••••">
          </div>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loading()"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow">
          @if(loading()) {
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          Ingresando...
          } @else {
          Iniciar Sesión
          }
        </button>
      </div>

      <div class="flex items-center justify-center text-sm">
        <span class="text-[#616f89] dark:text-gray-400">¿No tienes una cuenta?</span>
        <a routerLink="/register"
          class="ml-1 font-bold text-primary hover:text-primary/80 transition-colors cursor-pointer text-decoration-none">
          Crear cuenta
        </a>
      </div>

      <!-- Acceso de demostración -->
      <div class="mt-8 pt-6 border-t border-[#dbdfe6] dark:border-[#333]">
        <div class="rounded-lg bg-gray-50 dark:bg-[#111318] p-4 border border-[#dbdfe6] dark:border-[#333]">
          <div class="flex items-center gap-2 mb-2">
            <span class="material-symbols-outlined text-primary text-sm">info</span>
            <span class="text-xs font-bold text-[#111318] dark:text-white uppercase tracking-wider">Acceso Demo</span>
          </div>
          <div class="space-y-1">
            <div class="flex justify-between text-xs">
              <span class="text-[#616f89]">Email:</span>
              <span class="font-mono font-medium text-[#111318] dark:text-white select-all">admin@llaves.com</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-[#616f89]">Contraseña:</span>
              <span class="font-mono font-medium text-[#111318] dark:text-white select-all">test123</span>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
